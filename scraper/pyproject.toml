[tool.ruff]
target-version = "py311"
exclude = ["venv"]

[tool.ruff.lint]
# Pyflakes + pycodestyle errors only (no line-length / pyupgrade noise).
# Widen later: ruff check --extend-select I,UP,B
select = ["E4", "E7", "E9", "F"]
ignore = []

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
explicit_package_bases = true
